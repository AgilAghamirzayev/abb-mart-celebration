<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Martınız Mübarək | Təbrik</title>
    <meta name="description" content="İş yoldaşları üçün peşəkar və zövqlü 8 Mart təbrik səhifəsi.">
    <meta property="og:title" content="8 Martınız Mübarək, dəyərli həmkarlar!">
    <meta property="og:description" content="8 Mart münasibətilə sağlamlıq, ilham və yeni uğurlar dilənir.">
    <meta property="og:image" content="og-romantic.jpg">
    <meta property="og:image:secure_url" content="og-romantic.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:alt" content="8 Mart münasibətilə peşəkar təbrik kartı">
    <meta property="og:locale" content="az_AZ">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="8 Martınız Mübarək, dəyərli həmkarlar!">
    <meta name="twitter:description" content="8 Mart münasibətilə sağlamlıq, ilham və yeni uğurlar dilənir.">
    <meta name="twitter:image" content="og-romantic.jpg">
    <meta property="og:type" content="website">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;700&display=swap');

        :root {
            --ink: #22313f;
            --ink-soft: rgba(34, 49, 63, 0.85);
            --accent: #d86f4e;
            --accent-strong: #c7593c;
            --mint: #4e8d86;
            --gold: #cc9d4f;
            --bg-top: #fdf6ef;
            --bg-mid: #f7e6d8;
            --bg-bottom: #f6efe8;
            --card-bg: rgba(255, 255, 255, 0.74);
            --card-shadow: 0 26px 52px rgba(54, 74, 90, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            display: grid;
            place-items: center;
            padding: clamp(16px, 4vw, 34px);
            background: radial-gradient(circle at 14% 15%, rgba(255, 219, 186, 0.72), transparent 38%),
            radial-gradient(circle at 85% 10%, rgba(198, 230, 219, 0.55), transparent 33%),
            linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            color: var(--ink);
        }

        .scene {
            position: relative;
            z-index: 3;
            width: min(94vw, 560px);
            display: grid;
            gap: 14px;
        }

        .halo {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .halo.left {
            width: min(42vw, 300px);
            aspect-ratio: 1;
            left: -10%;
            bottom: 8%;
            background: radial-gradient(circle, rgba(244, 189, 149, 0.55), rgba(244, 189, 149, 0));
        }

        .halo.right {
            width: min(44vw, 340px);
            aspect-ratio: 1;
            right: -12%;
            top: 2%;
            background: radial-gradient(circle, rgba(151, 209, 191, 0.45), rgba(151, 209, 191, 0));
            animation-delay: 2s;
        }

        @keyframes drift {
            from {
                transform: translateY(0) translateX(0) scale(1);
            }
            to {
                transform: translateY(-10px) translateX(10px) scale(1.04);
            }
        }

        .floating-symbol {
            position: fixed;
            left: 0;
            top: 0;
            --duration: 5200ms;
            --drift: 0px;
            color: rgba(216, 111, 78, 0.85);
            opacity: 0;
            pointer-events: none;
            z-index: 6;
            filter: drop-shadow(0 4px 8px rgba(80, 102, 117, 0.18));
            animation: float-up var(--duration) linear forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translate3d(-50%, 0, 0) scale(0.8) rotate(0deg);
            }
            12% {
                opacity: 0.95;
            }
            100% {
                opacity: 0;
                transform: translate3d(calc(-50% + var(--drift)), -116vh, 0) scale(1.45) rotate(12deg);
            }
        }

        .card {
            position: relative;
            width: 100%;
            border-radius: 28px;
            padding: clamp(24px, 5.8vw, 42px) clamp(18px, 5vw, 34px);
            background: linear-gradient(148deg, var(--card-bg), rgba(255, 249, 242, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            box-shadow: var(--card-shadow);
            transition: transform 0.26s ease;
            text-align: center;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        .card.is-active {
            animation: card-pop 320ms ease;
        }

        @keyframes card-pop {
            0% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }

        .badge {
            display: inline-block;
            margin-bottom: 14px;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #376f67;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.88), rgba(212, 242, 234, 0.86));
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-weight: 700;
        }

        .icon-wrap {
            width: clamp(84px, 21vw, 108px);
            height: clamp(84px, 21vw, 108px);
            margin: 0 auto 16px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: clamp(36px, 8vw, 46px);
            background: radial-gradient(circle at 30% 30%, #fff, #fff3e8);
            box-shadow: 0 10px 24px rgba(78, 141, 134, 0.24);
            animation: pulse 2.4s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(78, 141, 134, 0.34);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 18px rgba(78, 141, 134, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(78, 141, 134, 0);
            }
        }

        h1 {
            font-family: "Fraunces", "Cambria", serif;
            font-size: clamp(1.9rem, 6.6vw, 2.8rem);
            line-height: 1.1;
            color: #244153;
            margin-bottom: 12px;
            font-weight: 700;
            text-wrap: balance;
        }

        .lead {
            font-size: clamp(0.96rem, 2.5vw, 1.07rem);
            line-height: 1.7;
            color: var(--ink-soft);
            margin-bottom: 22px;
            max-width: 48ch;
            margin-left: auto;
            margin-right: auto;
        }

        .signature {
            margin-bottom: 22px;
            color: rgba(35, 55, 71, 0.9);
            font-size: 0.93rem;
            font-weight: 600;
        }

        .actions {
            display: grid;
            justify-items: center;
            gap: 12px;
        }

        .btn,
        .share-btn {
            border: none;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
        }

        .btn {
            padding: 12px 18px;
            width: min(100%, 300px);
            color: #fff;
            background: linear-gradient(112deg, var(--accent), var(--gold));
            box-shadow: 0 10px 20px rgba(190, 99, 66, 0.33);
        }

        .btn::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.46), transparent);
            transform: translateX(-130%);
            animation: cta-sheen 3s ease-in-out infinite;
        }

        .share-btn {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #ffffff, #effaf4);
            color: #1e9f5b;
            border: 1px solid rgba(255, 255, 255, 0.88);
            box-shadow: 0 8px 16px rgba(78, 141, 134, 0.2);
        }

        .share-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn:hover,
        .share-btn:hover {
            transform: translateY(-2px);
            filter: saturate(1.08);
        }

        .btn:hover {
            box-shadow: 0 14px 24px rgba(190, 99, 66, 0.37);
        }

        .share-btn:hover {
            box-shadow: 0 12px 22px rgba(78, 141, 134, 0.25);
        }

        .btn:active,
        .share-btn:active {
            transform: translateY(1px) scale(0.985);
        }

        @keyframes cta-sheen {
            0%, 70% {
                transform: translateX(-130%);
            }
            100% {
                transform: translateX(130%);
            }
        }

        .sparkle {
            position: fixed;
            left: 0;
            top: 0;
            --duration: 1100ms;
            --dx: 0px;
            --dy: 0px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 7;
            animation: sparkle-fly var(--duration) ease-out forwards;
        }

        @keyframes sparkle-fly {
            from {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                opacity: 0;
                transform: translate3d(var(--dx), var(--dy), 0) scale(0.2);
            }
        }

        @media (max-width: 520px) {
            .card {
                border-radius: 24px;
            }

            .btn {
                width: 100%;
            }
        }

        @media (max-width: 370px) {
            .lead {
                font-size: 0.92rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .halo,
            .icon-wrap {
                animation: none;
            }

            .floating-symbol,
            .sparkle {
                display: none;
            }

            .btn::after {
                display: none;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

<div class="halo left" aria-hidden="true"></div>
<div class="halo right" aria-hidden="true"></div>

<div class="scene">
    <main class="card" id="card">
        <div class="icon-wrap" aria-hidden="true">🌷</div>
        <h1>8 Martınız Mübarək, dəyərli həmkarlar!</h1>
        <p class="lead">
            Göstərdiyiniz peşəkarlıq, zəhmət və dəstək iş mühitimizi hər gün daha güclü edir.
        </p>
        <p class="lead">
            8 Mart münasibətilə sizə sağlamlıq, ilham və yeni uğurlar diləyir və sizi təbrik edirəm.
        </p>

        <div class="actions">
            <button class="btn" id="celebrateBtn" type="button">Təbriklər ✨</button>
        </div>
    </main>
</div>

<span class="sr-only" aria-live="polite" id="liveMessage"></span>

<script>
    const motionReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const card = document.getElementById('card');
    const celebrateBtn = document.getElementById('celebrateBtn');
    const shareBtn = document.getElementById('shareBtn');
    const liveMessage = document.getElementById('liveMessage');
    const symbols = ['🌸', '✨', '🌷', '💮'];

    function createFloatingSymbol(originX, originY) {
        if (motionReduced) return;

        const symbol = document.createElement('span');
        symbol.className = 'floating-symbol';
        symbol.textContent = symbols[Math.floor(Math.random() * symbols.length)];

        const x = originX ?? Math.random() * window.innerWidth;
        const y = originY ?? window.innerHeight + 30;
        const drift = (Math.random() - 0.5) * 140;
        const duration = 4200 + Math.random() * 2200;
        const size = 14 + Math.random() * 22;

        symbol.style.left = `${x}px`;
        symbol.style.top = `${y}px`;
        symbol.style.fontSize = `${size}px`;
        symbol.style.setProperty('--drift', `${drift}px`);
        symbol.style.setProperty('--duration', `${duration}ms`);

        document.body.appendChild(symbol);
        setTimeout(() => symbol.remove(), duration);
    }

    function burstSparkles(originX, originY, count = 24) {
        if (motionReduced) return;

        for (let i = 0; i < count; i += 1) {
            const sparkle = document.createElement('span');
            sparkle.className = 'sparkle';

            const angle = (Math.PI * 2 * i) / count;
            const spread = 90 + Math.random() * 170;
            const dx = Math.cos(angle) * spread;
            const dy = Math.sin(angle) * spread;

            sparkle.style.left = `${originX}px`;
            sparkle.style.top = `${originY}px`;
            sparkle.style.setProperty('--dx', `${dx}px`);
            sparkle.style.setProperty('--dy', `${dy}px`);
            sparkle.style.setProperty('--duration', `${860 + Math.random() * 380}ms`);
            sparkle.style.background = i % 3 === 0 ? '#ffffff' : (i % 2 === 0 ? '#f0b37d' : '#68a69f');

            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1300);
        }
    }

    function animateFromButton(button, sparkles = 24, symbolsCount = 12) {
        const rect = button.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        burstSparkles(x, y, sparkles);
        for (let i = 0; i < symbolsCount; i += 1) {
            createFloatingSymbol(
                x + (Math.random() - 0.5) * 130,
                y + (Math.random() - 0.5) * 60
            );
        }
    }

    function shareToWhatsApp() {
        const pageUrl = window.location.href;
        const waUrl = `https://wa.me/?text=${encodeURIComponent(pageUrl)}`;
        window.open(waUrl, '_blank', 'noopener');

        animateFromButton(shareBtn, 18, 8);
        liveMessage.textContent = 'WhatsApp paylaşımı açıldı';
    }

    if (!motionReduced) {
        setInterval(() => createFloatingSymbol(), 720);
    }

    celebrateBtn.addEventListener('click', () => {
        card.classList.add('is-active');
        animateFromButton(celebrateBtn, 34, 16);
        liveMessage.textContent = '8 Martınız mübarək!';
        setTimeout(() => card.classList.remove('is-active'), 300);
    });

    shareBtn.addEventListener('click', shareToWhatsApp);

    document.addEventListener('pointerdown', (event) => {
        if (motionReduced || event.target.closest('.btn, .share-btn')) return;
        burstSparkles(event.clientX, event.clientY, 12);
        createFloatingSymbol(event.clientX, event.clientY);
    }, {passive: true});
</script>
</body>
</html>
